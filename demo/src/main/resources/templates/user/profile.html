<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ cá nhân</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/user/profile.css}">
</head>
<body>

<div th:replace="~{layout/header :: header}"></div>

<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-10 col-xl-9">

            <div class="card shadow border-0 rounded-4">
                <div class="card-body p-4 p-md-5">
                    <h2 class="mb-5 text-center fw-bold">Hồ sơ cá nhân</h2>

                    <form th:action="@{/profile/update}" th:object="${user}" method="post" enctype="multipart/form-data" id="profileForm" novalidate>

                        <div class="profile-message-container">
                            <div th:if="${errorMessage}" class="txt-msg-error">
                                <i class="fas fa-exclamation-triangle me-2"></i>
                                <span th:text="${errorMessage}"></span>
                            </div>

                            <div th:if="${successMessage}" class="txt-msg-success">
                                <i class="fas fa-check-circle me-2"></i>
                                <span th:text="${successMessage}"></span>
                            </div>
                        </div>

                        <div class="avatar-header text-center">
                            <div class="avatar-preview-wrapper">
                                <img th:src="${#strings.isEmpty(user.avatar) ? '/images/default-avatar.svg' : '/upload_img/avatars/' + user.avatar}"
                                     id="avatar-preview" alt="Avatar">

                                <label for="file-input" class="camera-badge">
                                    <i class="fas fa-camera"></i>
                                </label>
                                <input type="file" id="file-input" name="avatarFile" class="d-none" accept="image/*">
                            </div>
                        </div>

                        <div class="row mt-5">
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label class="fw-bold mb-1">Tên tài khoản</label>
                                    <input type="text" th:field="*{username}" class="form-control input-readonly" readonly>
                                </div>
                                <div class="form-group mb-3">
                                    <label class="fw-bold mb-1">Họ và tên <span class="text-danger">*</span></label>
                                    <input type="text" th:field="*{fullName}" id="fullName" class="form-control">
                                    <div id="nameError" class="text-danger small mt-1 d-none">Vui lòng nhập họ và tên</div>
                                </div>
                                <div class="form-group mb-3">
                                    <label class="fw-bold mb-1">Giới tính</label>
                                    <select th:field="*{gender}" class="form-select">
                                        <option value="">(Chưa xác định)</option>
                                        <option value="Nam">Nam</option>
                                        <option value="Nữ">Nữ</option>
                                    </select>
                                </div>
                                <div class="form-group mb-3">
                                    <label class="fw-bold mb-1">Ngày sinh</label>
                                    <input type="date" th:field="*{dob}" class="form-control">
                                </div>
                                <div class="form-group mb-3">
                                    <label class="fw-bold mb-1">Số điện thoại</label>
                                    <input type="tel" th:field="*{phone}" class="form-control">
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label class="fw-bold mb-1">Email liên hệ</label>
                                    <input type="email" th:field="*{contactEmail}" class="form-control">
                                </div>
                                <div class="form-group mb-3">
                                    <label class="fw-bold mb-1"><i class="fab fa-facebook text-primary me-1"></i>Link Facebook</label>
                                    <input type="url" th:field="*{linkFb}" class="form-control">
                                </div>
                                <div class="form-group mb-3">
                                    <label class="fw-bold mb-1"><i class="fab fa-youtube text-danger me-1"></i>Link Youtube</label>
                                    <input type="url" th:field="*{linkYt}" class="form-control">
                                </div>
                                <div class="form-group mb-3">
                                    <label class="fw-bold mb-1"><i class="fab fa-tiktok text-dark me-1"></i>Link Tiktok</label>
                                    <input type="url" th:field="*{linkTiktok}" class="form-control">
                                </div>
                            </div>
                        </div>

                        <div class="form-group mb-3 mt-2">
                            <label class="fw-bold mb-1">Giới thiệu bản thân</label>
                            <textarea th:field="*{bio}" class="form-control" rows="3"></textarea>
                        </div>

                        <div class="form-group mb-5">
                            <label class="fw-bold mb-1">Địa chỉ</label>
                            <input type="text" th:field="*{address}" class="form-control">
                        </div>

                        <div class="text-center mt-4">
                            <button type="submit" class="btn px-5 py-3 text-white fw-bold shadow-sm" style="background: linear-gradient(135deg, #ff8c00 0%, #ff6a00 100%); border: none; border-radius: 12px; font-size: 1.1rem;">
                                Cập nhật hồ sơ
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{layout/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/user/profile.js}"></script>

</body>
</html>
