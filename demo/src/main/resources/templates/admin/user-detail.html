<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chi tiết Người dùng - Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" th:href="@{/css/admin/admin.css}">
</head>
<body>

<div th:replace="~{layout/admin-sidebar :: sidebar(activePage='users')}"></div>

<div class="admin-main-content bg-light">

  <div class="mb-4">
    <a th:href="@{/admin/users}" class="text-decoration-none text-secondary fw-bold">
      <i class="fa-solid fa-arrow-left me-2"></i> Quay lại danh sách
    </a>
  </div>

  <div th:if="${param.success != null}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
    <i class="fa-solid fa-circle-check me-2"></i> Đã cập nhật quyền và trạng thái thành công!
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <div th:if="${param.error != null}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
    <i class="fa-solid fa-triangle-exclamation me-2"></i> Có lỗi xảy ra khi cập nhật!
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <div class="row g-4">
    <div class="col-12 col-xl-4">
      <div class="card border-0 shadow-sm rounded-4 text-center p-4 h-100">
        <div class="mb-3">
          <img th:src="${#strings.isEmpty(u.avatar) ? '/images/default-avatar.svg' : '/upload_img/avatars/' + u.avatar}"
               class="rounded-circle shadow-sm border border-3 border-white"
               style="width: 150px; height: 150px; object-fit: cover;">
        </div>
        <h4 class="fw-bold mb-1 text-dark" th:text="${u.fullName}">Tên Người Dùng</h4>
        <p class="text-muted mb-3" th:text="${u.email}">email@example.com</p>

        <ul class="list-group list-group-flush text-start mt-3">
          <li class="list-group-item px-0 bg-transparent border-light"><i class="fa-solid fa-phone me-2 text-primary w-20px"></i> <span class="fw-medium">SĐT:</span> <span th:text="${u.phone ?: 'Chưa cập nhật'}"></span></li>
          <li class="list-group-item px-0 bg-transparent border-light"><i class="fa-solid fa-location-dot me-2 text-danger w-20px"></i> <span class="fw-medium">Địa chỉ:</span> <span th:text="${u.address ?: 'Chưa cập nhật'}"></span></li>
          <li class="list-group-item px-0 bg-transparent border-light"><i class="fa-regular fa-calendar-days me-2 text-warning w-20px"></i> <span class="fw-medium">Ngày tham gia:</span> <span th:text="${#temporals.format(u.createdAt, 'dd/MM/yyyy')}"></span></li>
        </ul>
      </div>
    </div>

    <div class="col-12 col-xl-8">
      <div class="card border-0 shadow-sm rounded-4 p-4 h-100">
        <h5 class="fw-bold text-secondary mb-4 border-bottom pb-3">
          <i class="fa-solid fa-user-shield me-2"></i> Phân quyền & Trạng thái
        </h5>

        <form th:action="@{/admin/users/update}" method="POST">
          <input type="hidden" name="id" th:value="${u.id}">

          <div class="row mb-4">
            <div class="col-md-6 mb-3 mb-md-0">
              <label class="form-label fw-bold text-dark">Vai trò (Role)</label>
              <select class="form-select form-select-lg shadow-sm border-light" name="role">
                <option value="ROLE_USER" th:selected="${u.role == 'ROLE_USER'}">Người dùng (USER)</option>
                <option value="ROLE_ADMIN" th:selected="${u.role == 'ROLE_ADMIN'}">Quản trị viên (ADMIN)</option>
              </select>
              <div class="form-text mt-2"><i class="fa-solid fa-circle-info text-info me-1"></i> Quản trị viên có toàn quyền truy cập trang Admin.</div>
            </div>

            <div class="col-md-6">
              <label class="form-label fw-bold text-dark">Trạng thái</label>
              <select class="form-select form-select-lg shadow-sm border-light" name="status">
                <option value="ACTIVE" th:selected="${u.status == 'ACTIVE'}">Hoạt động (ACTIVE)</option>
                <option value="INACTIVE" th:selected="${u.status == 'INACTIVE'}">Chờ kích hoạt (INACTIVE)</option>
                <option value="BANNED" th:selected="${u.status == 'BANNED'}">Khóa tài khoản (BANNED)</option>
                <option value="DELETED" th:selected="${u.status == 'DELETED'}">Đã xóa (DELETED)</option>
              </select>
              <div class="form-text mt-2"><i class="fa-solid fa-circle-info text-danger me-1"></i> Tài khoản bị khóa (BANNED) sẽ không thể đăng nhập.</div>
            </div>
          </div>

          <div class="text-end mt-5 pt-3 border-top">
            <button type="submit" class="btn btn-primary px-5 py-2 fw-bold shadow-sm rounded-pill">
              <i class="fa-solid fa-floppy-disk me-2"></i> Lưu thay đổi
            </button>
          </div>
        </form>

      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
