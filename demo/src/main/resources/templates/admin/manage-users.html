<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Người dùng - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/admin/admin.css}">
</head>
<body>

<div th:replace="~{layout/admin-sidebar :: sidebar(activePage='users')}"></div>

<div class="admin-main-content bg-light">

    <div class="admin-header d-flex justify-content-between align-items-center mb-4 p-3 bg-white shadow-sm rounded-3">
        <h5 class="mb-0 fw-bold text-secondary">DANH SÁCH NGƯỜI DÙNG</h5>
        <div class="d-flex align-items-center">
            <span class="me-3 fw-medium text-dark" th:text="${session.loggedInUser.fullName}">Admin Name</span>
            <img th:src="${#strings.isEmpty(session.loggedInUser.avatar) ? '/images/default-avatar.svg' : '/upload_img/avatars/' + session.loggedInUser.avatar}"
                 class="rounded-circle border border-2 border-white shadow-sm" style="width: 45px; height: 45px; object-fit: cover;">
        </div>
    </div>

    <div th:if="${param.error != null}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
        <i class="fa-solid fa-triangle-exclamation me-2"></i>
        <span th:text="${param.error[0] == 'cannot_ban_self' ? 'Bạn không thể tự khóa tài khoản của chính mình!' : 'Có lỗi xảy ra khi thao tác!'}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="card border-0 shadow-sm rounded-4 mb-4 p-3 bg-white">
        <form th:action="@{/admin/users}" method="GET" class="row g-3 align-items-center">
            <div class="col-md-5">
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-magnifying-glass text-muted"></i></span>
                    <input type="text" name="keyword" th:value="${keyword}" class="form-control border-start-0 bg-light" placeholder="Tìm theo Tên, Email, SĐT...">
                </div>
            </div>
            <div class="col-md-4">
                <select name="status" class="form-select bg-light text-secondary">
                    <option value="">-- Tất cả trạng thái --</option>
                    <option value="ACTIVE" th:selected="${status == 'ACTIVE'}">Hoạt động (ACTIVE)</option>
                    <option value="INACTIVE" th:selected="${status == 'INACTIVE'}">Chưa kích hoạt (INACTIVE)</option>
                    <option value="BANNED" th:selected="${status == 'BANNED'}">Bị khóa (BANNED)</option>
                    <option value="DELETED" th:selected="${status == 'DELETED'}">Đã xóa (DELETED)</option>
                </select>
            </div>
            <div class="col-md-3 d-flex">
                <button type="submit" class="btn btn-primary px-4 fw-medium shadow-sm w-100 me-2"><i class="fa-solid fa-filter me-1"></i> Lọc</button>
                <a th:href="@{/admin/users}" class="btn btn-outline-secondary fw-medium shadow-sm w-100"><i class="fa-solid fa-rotate-right me-1"></i> Đặt lại</a>
            </div>
        </form>
    </div>

    <div class="card border-0 shadow-sm rounded-4 overflow-hidden mb-4">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="px-4 py-3">ID</th>
                        <th class="py-3">Họ và tên</th>
                        <th class="py-3">Email</th>
                        <th class="py-3">Vai trò</th>
                        <th class="py-3">Trạng thái</th>
                        <th class="py-3 text-center">Hành động</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="u : ${users}">
                        <td class="px-4 fw-bold text-secondary" th:text="${u.id}">1</td>
                        <td>
                            <div class="d-flex align-items-center">
                                <img th:src="${#strings.isEmpty(u.avatar) ? '/images/default-avatar.svg' : '/upload_img/avatars/' + u.avatar}"
                                     class="rounded-circle me-3 border" style="width: 40px; height: 40px; object-fit: cover;">
                                <span class="fw-medium text-dark" th:text="${u.fullName}">Tên User</span>
                            </div>
                        </td>
                        <td th:text="${u.email}">email@example.com</td>

                        <td>
                            <span th:if="${u.role == 'ROLE_ADMIN'}" class="badge bg-danger rounded-pill px-3 py-2"><i class="fa-solid fa-crown me-1"></i> ADMIN</span>
                            <span th:if="${u.role == 'ROLE_USER'}" class="badge bg-secondary rounded-pill px-3 py-2">USER</span>
                        </td>

                        <td>
                            <span th:if="${u.status == 'ACTIVE'}" class="badge bg-success bg-opacity-10 text-success border border-success px-3 py-2 rounded-pill">Hoạt động</span>
                            <span th:if="${u.status == 'INACTIVE'}" class="badge bg-warning bg-opacity-10 text-warning border border-warning px-3 py-2 rounded-pill">Chưa kích hoạt</span>
                            <span th:if="${u.status == 'BANNED'}" class="badge bg-danger bg-opacity-10 text-danger border border-danger px-3 py-2 rounded-pill">Bị khóa</span>
                            <span th:if="${u.status == 'DELETED'}" class="badge bg-dark bg-opacity-10 text-dark border border-dark px-3 py-2 rounded-pill">Đã xóa</span>
                        </td>

                        <td class="text-center">
                            <a th:href="@{/admin/users/detail(id=${u.id})}" class="btn btn-sm btn-light text-primary border shadow-sm me-1" title="Xem chi tiết">
                                <i class="fa-solid fa-eye"></i>
                            </a>

                            <a th:if="${u.role != 'ROLE_ADMIN'}"
                               th:href="@{/admin/users/toggle-status(id=${u.id})}"
                               class="btn btn-sm btn-light border shadow-sm"
                               th:classappend="${u.status == 'BANNED'} ? 'text-success' : 'text-danger'"
                               th:title="${u.status == 'BANNED'} ? 'Mở khóa tài khoản' : 'Khóa tài khoản'">
                                <i class="fa-solid" th:classappend="${u.status == 'BANNED'} ? 'fa-unlock' : 'fa-lock'"></i>
                            </a>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(users)}">
                        <td colspan="6" class="text-center py-4 text-muted">
                            <i class="fa-solid fa-box-open fs-1 text-light mb-2"></i><br>
                            Không tìm thấy người dùng nào phù hợp.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card-footer bg-white border-0 py-3" th:if="${totalPages > 0}">
            <nav aria-label="Page navigation">
                <ul class="pagination justify-content-center mb-0">

                    <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                        <a class="page-link shadow-sm" th:href="@{/admin/users(page=${currentPage - 1}, keyword=${keyword}, status=${status})}">
                            <i class="fa-solid fa-angle-left"></i> Trước
                        </a>
                    </li>

                    <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}" th:classappend="${currentPage == i} ? 'active'">
                        <a class="page-link shadow-sm" th:href="@{/admin/users(page=${i}, keyword=${keyword}, status=${status})}" th:text="${i}">1</a>
                    </li>

                    <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                        <a class="page-link shadow-sm" th:href="@{/admin/users(page=${currentPage + 1}, keyword=${keyword}, status=${status})}">
                            Sau <i class="fa-solid fa-angle-right"></i>
                        </a>
                    </li>
                </ul>
            </nav>
            <div class="text-center mt-2 text-muted small">
                Hiển thị tổng cộng <strong th:text="${totalItems}"></strong> người dùng.
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
