<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Ươm Mầm</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" th:href="@{/css/admin/admin.css}">
</head>
<body>

<div th:replace="~{layout/admin-sidebar :: sidebar(activePage='dashboard')}"></div>

<div class="admin-main-content bg-light">

  <div class="admin-header d-flex justify-content-between align-items-center mb-4 p-3 bg-white shadow-sm rounded-3">
    <h5 class="mb-0 fw-bold text-secondary">BẢNG ĐIỀU KHIỂN TỔNG QUAN</h5>
    <div class="d-flex align-items-center">
      <span class="me-3 fw-medium text-dark" th:text="${session.loggedInUser.fullName}">Admin Name</span>
      <img th:src="${#strings.isEmpty(session.loggedInUser.avatar) ? '/images/default-avatar.svg' : '/upload_img/avatars/' + session.loggedInUser.avatar}"
           class="rounded-circle border border-2 border-white shadow-sm" style="width: 45px; height: 45px; object-fit: cover;">
    </div>
  </div>

  <div class="row g-4 mb-4">
    <div class="col-12 col-sm-6 col-xl-4 col-xxl-2">
      <div class="card border-0 shadow-sm rounded-4 text-white h-100" style="background: linear-gradient(135deg, #3a7bd5, #3a6073);">
        <div class="card-body p-3 d-flex justify-content-between align-items-center">
          <div>
            <h6 class="text-uppercase mb-1 opacity-75 fw-bold small" style="font-size: 0.7rem;">Người Dùng</h6>
            <h4 class="mb-0 fw-bold" th:text="${totalUsers}">0</h4>
          </div>
          <div class="fs-2 opacity-50"><i class="fa-solid fa-users"></i></div>
        </div>
      </div>
    </div>

    <div class="col-12 col-sm-6 col-xl-4 col-xxl-2">
      <div class="card border-0 shadow-sm rounded-4 text-white h-100" style="background: linear-gradient(135deg, #f2994a, #f2c94c);">
        <div class="card-body p-3 d-flex justify-content-between align-items-center">
          <div>
            <h6 class="text-uppercase mb-1 opacity-75 fw-bold small" style="font-size: 0.7rem;">Chiến dịch</h6>
            <h4 class="mb-0 fw-bold" th:text="${totalCampaigns}">0</h4>
          </div>
          <div class="fs-2 opacity-50"><i class="fa-solid fa-flag"></i></div>
        </div>
      </div>
    </div>

    <div class="col-12 col-sm-6 col-xl-4 col-xxl-3">
      <div class="card border-0 shadow-sm rounded-4 text-white h-100" style="background: linear-gradient(135deg, #11998e, #38ef7d);">
        <div class="card-body p-3 d-flex justify-content-between align-items-center">
          <div>
            <h6 class="text-uppercase mb-1 opacity-75 fw-bold small" style="font-size: 0.7rem;">Tổng Quyên Góp</h6>
            <h4 class="mb-0 fw-bold" th:text="${#numbers.formatDecimal(totalMoney, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</h4>
          </div>
          <div class="fs-2 opacity-50"><i class="fa-solid fa-sack-dollar"></i></div>
        </div>
      </div>
    </div>

    <div class="col-12 col-sm-6 col-xl-6 col-xxl-2">
      <div class="card border-0 shadow-sm rounded-4 text-white h-100" style="background: linear-gradient(135deg, #6a11cb, #2575fc);">
        <div class="card-body p-3 d-flex justify-content-between align-items-center">
          <div>
            <h6 class="text-uppercase mb-1 opacity-75 fw-bold small" style="font-size: 0.7rem;">Lượt ủng hộ</h6>
            <h4 class="mb-0 fw-bold" th:text="${totalDonors}">0</h4>
          </div>
          <div class="fs-2 opacity-50"><i class="fa-solid fa-heart"></i></div>
        </div>
      </div>
    </div>

    <div class="col-12 col-sm-6 col-xl-6 col-xxl-3">
      <div class="card border-0 shadow-sm rounded-4 text-white h-100" style="background: linear-gradient(135deg, #ee0979, #ff6a00);">
        <div class="card-body p-3 d-flex justify-content-between align-items-center">
          <div>
            <h6 class="text-uppercase mb-1 opacity-75 fw-bold small" style="font-size: 0.7rem;">Báo cáo vi phạm</h6>
            <h4 class="mb-0 fw-bold" th:text="${totalReports}">0</h4>
          </div>
          <div class="fs-2 opacity-50"><i class="fa-solid fa-triangle-exclamation"></i></div>
        </div>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
