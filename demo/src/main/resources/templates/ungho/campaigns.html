<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Danh sách các chiến dịch gây quỹ cộng đồng..." />
  <title>Danh sách chiến dịch</title>

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" th:href="@{/css/campaigns.css?v=1.6}" />
</head>
<body>
<div th:replace="~{layout/header :: header}"></div>

<main class="container mt-5">

  <h1 class="text-center mb-4 campaign-title-orange">
    Danh sách chiến dịch gây quỹ
  </h1>

  <nav class="text-center mb-4 filter-tabs" aria-label="Lọc theo đối tượng">
    <a th:href="@{/danh-sach-chien-dich(status=${status}, categoryId=${categoryId}, keyword=${keyword})}"
       class="tab text-decoration-none"
       th:classappend="${selectedType == null || selectedType == ''} ? 'active' : ''">Tất cả</a>

    <a th:href="@{/danh-sach-chien-dich(type='org', status=${status}, categoryId=${categoryId}, keyword=${keyword})}"
       class="tab text-decoration-none"
       th:classappend="${selectedType == 'org'} ? 'active' : ''">Tổ chức</a>

    <a th:href="@{/danh-sach-chien-dich(type='person', status=${status}, categoryId=${categoryId}, keyword=${keyword})}"
       class="tab text-decoration-none"
       th:classappend="${selectedType == 'person'} ? 'active' : ''">Cá nhân</a>
  </nav>

  <form id="filterForm" th:action="@{/danh-sach-chien-dich}" method="GET" class="row align-items-center mb-4 g-3">
    <input type="hidden" name="type" th:value="${selectedType}" th:if="${selectedType != null}" />
    <input type="hidden" name="status" id="statusInput" th:value="${status}" />

    <div class="col-md-7 d-flex gap-3">

      <div class="dropdown w-auto">
        <button class="btn btn-light border dropdown-toggle d-flex align-items-center justify-content-between status-dropdown-btn"
                type="button" data-bs-toggle="dropdown" aria-expanded="false">
          <span class="text-dark" id="statusText">
              <th:block th:if="${status == 'active'}">Đang thực hiện</th:block>
              <th:block th:if="${status == 'goal'}">Đạt mục tiêu</th:block>
              <th:block th:if="${status == 'ended'}">Đã kết thúc</th:block>
              <th:block th:if="${status == 'paused'}">Tạm dừng</th:block>
              <th:block th:if="${status == null || status == ''}">Tất cả trạng thái</th:block>
          </span>
        </button>

        <ul class="dropdown-menu shadow border-0 category-dropdown-menu">
          <li>
            <a class="dropdown-item category-dropdown-item" href="javascript:void(0)" onclick="updateStatus('')"
               th:classappend="${status == null || status == ''} ? 'active-status' : ''">Tất cả trạng thái</a>
          </li>
          <li>
            <a class="dropdown-item category-dropdown-item" href="javascript:void(0)" onclick="updateStatus('active')"
               th:classappend="${status == 'active'} ? 'active-status' : ''">Đang thực hiện</a>
          </li>
          <li>
            <a class="dropdown-item category-dropdown-item" href="javascript:void(0)" onclick="updateStatus('goal')"
               th:classappend="${status == 'goal'} ? 'active-status' : ''">Đạt mục tiêu</a>
          </li>
          <li>
            <a class="dropdown-item category-dropdown-item" href="javascript:void(0)" onclick="updateStatus('ended')"
               th:classappend="${status == 'ended'} ? 'active-status' : ''">Đã kết thúc</a>
          </li>
          <li>
            <a class="dropdown-item category-dropdown-item" href="javascript:void(0)" onclick="updateStatus('paused')"
               th:classappend="${status == 'paused'} ? 'active-status' : ''">Tạm dừng</a>
          </li>
        </ul>
      </div>

      <div class="dropdown w-auto">
        <button class="btn btn-light border dropdown-toggle d-flex align-items-center justify-content-between category-dropdown-btn"
                type="button" data-bs-toggle="dropdown" aria-expanded="false" aria-label="Chọn danh mục">
                    <span class="text-dark">
                        <i class="fa-solid fa-layer-group text-secondary me-2" aria-hidden="true"></i>
                        Danh mục
                    </span>
        </button>

        <ul class="dropdown-menu shadow border-0 category-dropdown-menu">
          <li>
            <a class="dropdown-item d-flex align-items-center py-2 mb-1 category-dropdown-item"
               th:href="@{/danh-sach-chien-dich(type=${selectedType}, status=${status}, keyword=${keyword})}">
              <i class="fa-solid fa-border-all text-secondary me-3 category-icon-box" aria-hidden="true"></i>
              <span class="flex-grow-1 text-dark">Tất cả danh mục</span>
            </a>
          </li>

          <li th:each="cat : ${categories}">
            <a class="dropdown-item d-flex align-items-center py-2 mb-1 category-dropdown-item"
               th:classappend="${categoryId == cat.id} ? 'bg-light' : ''"
               th:href="@{/danh-sach-chien-dich(categoryId=${cat.id}, type=${selectedType}, status=${status}, keyword=${keyword})}">
              <i th:class="${cat.icon} + ' text-secondary me-3 category-icon-box category-icon-font'" aria-hidden="true"></i>
              <span class="flex-grow-1 text-dark category-text-size" th:text="${cat.name}"></span>
              <span class="badge bg-secondary ms-2 category-badge-custom"
                    th:text="${categoryCounts.get(cat.id) != null ? categoryCounts.get(cat.id) : 0}"></span>
            </a>
          </li>
        </ul>
      </div>

      <a th:href="@{/danh-sach-chien-dich(type=${selectedType})}" class="btn btn-light border" title="Xóa bộ lọc" aria-label="Xóa bộ lọc">
        <i class="fa-solid fa-rotate" aria-hidden="true"></i>
      </a>
    </div>

    <div class="col-md-5">
      <div class="input-group">
        <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="Tìm kiếm tên chiến dịch..." aria-label="Nhập từ khóa tìm kiếm" />
        <button type="submit" class="btn btn-outline-secondary input-group-text" aria-label="Tìm kiếm">
          <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
        </button>
      </div>
    </div>
  </form>

  <div class="row g-4" id="campaign-grid">
    <div class="col-md-6 col-lg-4 mb-4" th:each="campaign : ${campaigns}">

      <article class="card border-0 shadow-sm h-100 campaign-card-custom"
               th:data-campaign-id="${campaign.id}"
               th:classappend="${campaign.closed and campaign.status != 'goal'} ? 'campaign-disabled' : ''">

        <a th:href="@{/chien-dich/{id}(id=${campaign.id})}" class="text-decoration-none text-dark d-block h-100">
          <div class="position-relative">
            <img th:src="${campaign.imageUrl}" class="w-100 campaign-img-custom" th:alt="'Ảnh ' + ${campaign.title}" loading="lazy" />

            <span th:if="${campaign.status == 'ended' or (campaign.closed and campaign.status != 'paused' and campaign.status != 'goal')}"
                  class="badge bg-secondary position-absolute top-0 end-0 m-2 px-3 py-2 shadow-sm z-index-2">
              Đã kết thúc
            </span>
            <span th:if="${campaign.status == 'paused'}"
                  class="badge bg-warning text-dark position-absolute top-0 end-0 m-2 px-3 py-2 shadow-sm z-index-2">
              Tạm dừng
            </span>
            <span th:if="${campaign.status == 'goal'}"
                  class="badge bg-success position-absolute top-0 end-0 m-2 px-3 py-2 shadow-sm z-index-2">
              Đạt mục tiêu
            </span>

            <div class="progress-overlay-container">
              <div class="progress-overlay-glass">
                <div class="flex-grow-1 px-2">
                  <div class="d-flex justify-content-between text-white mb-1 progress-text-style">
                    <span class="live-amount" th:text="${#numbers.formatDecimal(campaign.currentAmount ?: 0, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                    <span class="live-progress-text" th:text="${campaign.progressPercentage} + '%'"></span>
                  </div>
                  <div class="progress progress-track-custom">
                    <div class="progress-bar progress-bar-gradient live-progress-bar"
                         th:style="'width: ' + ${campaign.progressPercentage} + '%;'"></div>
                  </div>
                </div>
                <div class="bg-white rounded-circle d-flex align-items-center justify-content-center ms-2 shadow heart-icon-wrapper">
                  <i class="fa-solid fa-hand-holding-heart heart-icon-style"></i>
                </div>
              </div>
            </div>
          </div>

          <div class="card-body p-3">
            <h3 class="fw-bold mb-2 campaign-title-style" th:text="${campaign.title}"></h3>
            <p class="text-muted mb-0 campaign-meta-style">
              <span class="live-count" th:text="${campaign.donationCount ?: 0}"></span> lượt ủng hộ •
              Còn <span th:text="${campaign.daysRemaining}"></span> ngày
            </p>
          </div>
        </a>
      </article>

    </div>
  </div>

  <nav class="custom-pagination mt-5" id="pagination-box" th:if="${totalPages != null && totalPages > 1}" aria-label="Phân trang">
    <a class="page-nav" th:classappend="${currentPage == 0} ? 'disabled'"
       th:href="@{/danh-sach-chien-dich(page=${currentPage - 1}, type=${selectedType}, status=${status}, categoryId=${categoryId}, keyword=${keyword})}" aria-label="Trang trước">
      <i class="fa-solid fa-chevron-left" aria-hidden="true"></i> Trang trước
    </a>
    <a class="page-num" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
       th:classappend="${currentPage == i} ? 'active'"
       th:href="@{/danh-sach-chien-dich(page=${i}, type=${selectedType}, status=${status}, categoryId=${categoryId}, keyword=${keyword})}"
       th:text="${i + 1}" th:aria-current="${currentPage == i ? 'page' : null}">1</a>
    <a class="page-nav" th:classappend="${currentPage == totalPages - 1} ? 'disabled'"
       th:href="@{/danh-sach-chien-dich(page=${currentPage + 1}, type=${selectedType}, status=${status}, categoryId=${categoryId}, keyword=${keyword})}" aria-label="Trang sau">
      Trang sau <i class="fa-solid fa-chevron-right" aria-hidden="true"></i>
    </a>
  </nav>
</main>
<div th:replace="~{layout/footer :: footer}"></div>
<script th:src="@{/js/campaigns.js}"></script>
<script th:src="@{/js/load.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
