<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" th:content="'Chi tiết chiến dịch gây quỹ: ' + ${campaign.title}">
  <title th:text="${campaign.title} + ' | Ươm Mầm'">Chi tiết chiến dịch</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" th:href="@{/css/campaign-detail.css}">
</head>
<body>

<div th:replace="~{layout/header :: header}"></div>

<main class="container campaign-detail-container mt-4">

  <header class="row campaign-header text-center mb-4">
    <div class="col-lg-10 mx-auto">
      <h1 class="campaign-title fw-bold" th:text="${campaign.title}">Tiêu đề chiến dịch</h1>
      <div class="tag-container d-flex justify-content-center gap-3 mt-3 text-muted">
        <div class="tag-box"><i class="fa-solid fa-folder-open me-2 text-warning"></i><span th:text="${campaign.type}">Loại</span></div>
        <div class="tag-box"><i class="fa-solid fa-map-location-dot me-2 text-primary"></i><span th:text="${campaign.locationName}">Địa điểm</span></div>
      </div>
    </div>
  </header>

  <div class="row g-4">
    <article class="col-lg-8">
      <img th:src="@{${campaign.imageUrl}}" class="main-image w-100 rounded-4 shadow-sm mb-4" th:alt="${campaign.title}" style="object-fit: cover; max-height: 450px;" loading="lazy">

      <div class="story-container bg-white p-4 rounded-4 shadow-sm">
        <nav class="nav nav-tabs nav-tabs-custom mb-4" role="tablist">
          <button class="nav-link active fw-bold" data-bs-toggle="tab" role="tab" aria-selected="true">Câu chuyện</button>
          <button class="nav-link fw-bold" data-bs-toggle="tab" role="tab" aria-selected="false">Hoạt động</button>
          <button class="nav-link fw-bold" data-bs-toggle="tab" role="tab" aria-selected="false">Người ủng hộ</button>
        </nav>

        <div class="story-text" th:utext="${campaign.storyContent}">
          Đang tải nội dung...
        </div>
      </div>
    </article>

    <aside class="col-lg-4">
      <div class="sticky-sidebar" style="position: sticky; top: 20px;">
        <div class="card stat-card border-0 shadow-sm rounded-4 p-4">

          <div class="organizer-box d-flex align-items-center mb-4 pb-3 border-bottom">
            <img src="https://i.pravatar.cc/150?img=32" alt="Avatar người vận động" class="rounded-circle me-3" style="width: 50px; height: 50px; object-fit: cover;">
            <div>
              <small class="text-muted d-block">Người vận động</small>
              <span class="fw-bold" th:text="${campaign.bankAccountName}">Họ tên chủ tài khoản</span>
              <i class="fa-solid fa-circle-check text-success ms-1" title="Đã xác thực"></i>
            </div>
          </div>

          <div class="d-flex justify-content-between mb-3">
            <div>
              <small class="text-muted">Mục tiêu</small>
              <div class="fw-bold text-dark fs-5">
                <span th:text="${#numbers.formatDecimal(campaign.targetAmount ?: 0, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
              </div>
            </div>
            <div class="text-end">
              <small class="text-muted">Thời gian còn</small>
              <div class="fw-bold text-dark fs-5">
                <span th:text="${campaign.daysRemaining}">0</span> ngày
              </div>
            </div>
          </div>

          <div class="progress mb-3" style="height: 8px; border-radius: 10px; background-color: #e9ecef;">
            <div class="progress-bar" role="progressbar"
                 style="background: linear-gradient(90deg, #ff6a00, #ffb347); border-radius: 10px;"
                 th:styleappend="'width: ' + ${campaign.progressPercentage} + '%;'"
                 th:aria-valuenow="${campaign.progressPercentage}" aria-valuemin="0" aria-valuemax="100">
            </div>
          </div>

          <div class="d-flex justify-content-between mb-4">
            <div>
              <small class="text-muted">Đã quyên góp</small>
              <div class="fs-4 fw-bold" style="color: #ff6a00;">
                <span th:text="${#numbers.formatDecimal(campaign.currentAmount ?: 0, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
              </div>
            </div>
            <div class="text-end">
              <small class="text-muted">Đạt được</small>
              <div class="fs-4 fw-bold text-dark" th:text="${campaign.progressPercentage} + '%'">0%</div>
            </div>
          </div>

          <div class="mb-4 text-secondary text-center p-2 rounded" style="background-color: #f8f9fa;">
            <i class="fa-solid fa-users me-2" style="color: #ff6a00;"></i>
            Đã có <strong class="text-dark fs-5" th:text="${campaign.donationCount ?: 0}">0</strong> lượt ủng hộ
          </div>

          <button th:unless="${campaign.status == 'paused' or campaign.status == 'ended' or (campaign.closed and campaign.status != 'goal')}"
                  th:onclick="|window.location.href='@{/donate(campaignId=${campaign.id})}'|"
                  class="btn w-100 fw-bold mb-0 py-3"
                  style="background: linear-gradient(90deg, #ff6a00, #ffb347); color: white; border-radius: 30px; font-size: 1.1rem; transition: 0.3s;"
                  onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 5px 15px rgba(255, 106, 0, 0.3)'"
                  onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='none'">
            Ủng hộ ngay
          </button>

          <button th:if="${campaign.status == 'ended' or (campaign.closed and campaign.status != 'paused' and campaign.status != 'goal')}"
                  class="btn btn-secondary w-100 fw-bold mb-0 py-3" disabled
                  style="border-radius: 30px; font-size: 1.1rem;">
            <i class="fa-solid fa-lock me-2"></i> Chiến dịch đã kết thúc
          </button>

          <button th:if="${campaign.status == 'paused'}"
                  class="btn btn-warning w-100 fw-bold mb-0 py-3 text-dark" disabled
                  style="border-radius: 30px; font-size: 1.1rem;">
            <i class="fa-solid fa-pause me-2"></i> Đang tạm dừng nhận ủng hộ
          </button>

        </div>
      </div>
    </aside>
  </div>
</main>

<div th:replace="~{layout/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
