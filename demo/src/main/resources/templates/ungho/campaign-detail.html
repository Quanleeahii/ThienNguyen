<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" th:content="'Chi tiết chiến dịch gây quỹ: ' + ${campaign.title}">
  <title th:text="${campaign.title} + ' | Ươm Mầm'">Chi tiết chiến dịch</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" th:href="@{/css/campaign-detail.css}">
</head>
<body>

<div th:replace="~{layout/header :: header}"></div>

<main class="container campaign-detail-container mt-4 mb-5">
  <header class="row campaign-header text-center mb-4">
    <div class="col-lg-10 mx-auto">
      <h1 class="campaign-title fw-bold" th:text="${campaign.title}"></h1>
      <div class="tag-container d-flex justify-content-center gap-3 mt-3 text-muted">
        <div class="tag-box"><i class="fa-solid fa-folder-open me-2 text-warning"></i><span th:text="${campaign.type}"></span></div>
        <div class="tag-box"><i class="fa-solid fa-map-location-dot me-2 text-primary"></i><span th:text="${campaign.locationName}"></span></div>
      </div>
    </div>
  </header>

  <div class="row g-4">
    <article class="col-lg-8">
      <img th:src="@{${campaign.imageUrl}}" class="main-image w-100 rounded-4 shadow-sm mb-4" th:alt="${campaign.title}" loading="lazy">

      <div class="story-container bg-white p-4 rounded-4 shadow-sm border">
        <ul class="nav nav-tabs nav-tabs-custom mb-4" id="campaignTab" role="tablist">
          <li class="nav-item">
            <button class="nav-link active fw-bold" data-bs-toggle="tab" data-bs-target="#story" type="button" role="tab">Câu chuyện</button>
          </li>
          <li class="nav-item">
            <button class="nav-link fw-bold" data-bs-toggle="tab" data-bs-target="#donors" type="button" role="tab">
              Danh sách ủng hộ (<span id="tabDonationCount" th:text="${campaign.donationCount ?: 0}">0</span>)
            </button>
          </li>
        </ul>

        <div class="tab-content">
          <div class="tab-pane fade show active" id="story" role="tabpanel">
            <div class="story-text" th:utext="${campaign.storyContent}"></div>
          </div>

          <div class="tab-pane fade" id="donors" role="tabpanel">
            <div class="d-flex justify-content-between align-items-center mb-4">
              <h5 class="fw-bold mb-0">Danh sách ủng hộ</h5>
              <div class="input-group search-donor-group">
                <span class="input-group-text bg-white border-end-0"><i class="fa-solid fa-magnifying-glass text-muted"></i></span>
                <input type="text" id="searchDonorInput" class="form-control border-start-0 ps-0" placeholder="Tìm kiếm người ủng hộ">
              </div>
            </div>

            <div class="table-responsive donor-table-wrapper pe-2">
              <table class="table align-middle table-borderless mb-0">
                <thead>
                <tr>
                  <th class="fw-bold pb-3 pt-3 text-dark">Người ủng hộ</th>
                  <th class="fw-bold pb-3 pt-3 text-end text-dark">Số tiền ủng hộ</th>
                  <th class="fw-bold pb-3 pt-3 text-end text-dark">Thời gian</th>
                </tr>
                </thead>
                <tbody id="donorTableBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </article>

    <aside class="col-lg-4">
      <div class="sticky-sidebar">
        <div class="card stat-card border-0 shadow-sm rounded-4 p-4">
          <input type="hidden" id="campaignId" th:value="${campaign.id}">

          <div class="organizer-box d-flex align-items-center mb-4 pb-3 border-bottom">
            <img th:src="${campaign.creator != null and !#strings.isEmpty(campaign.creator.avatar) ? '/upload_img/avatars/' + campaign.creator.avatar : '/images/default-avatar.svg'}"
                 onerror="this.onerror=null; this.src='/images/default-avatar.svg';"
                 alt="Avatar" class="rounded-circle me-3 avatar-organizer shadow-sm border">
            <div>
              <small class="text-muted d-block">Người vận động</small>
              <span class="fw-bold" th:text="${campaign.creator != null ? campaign.creator.fullName : 'Tổ chức Ươm Mầm'}"></span>
              <i class="fa-solid fa-circle-check text-success ms-1"></i>
            </div>
          </div>

          <div class="d-flex justify-content-between mb-3">
            <div>
              <small class="text-muted">Mục tiêu</small>
              <div class="fw-bold text-dark fs-5">
                <span th:text="${#numbers.formatDecimal(campaign.targetAmount ?: 0, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
              </div>
            </div>
            <div class="text-end">
              <small class="text-muted">Còn lại</small>
              <div class="fw-bold text-dark fs-5"><span th:text="${campaign.daysRemaining}">0</span> ngày</div>
            </div>
          </div>

          <div class="progress mb-3 progress-custom">
            <div class="progress-bar progress-bar-custom" id="campaignProgressBar" role="progressbar"
                 th:styleappend="'width: ' + ${campaign.progressPercentage} + '%;'">
            </div>
          </div>

          <div class="d-flex justify-content-between mb-4">
            <div>
              <small class="text-muted">Đã quyên góp</small>
              <div class="fs-4 fw-bold text-primary-orange">
                <span id="campaignCurrentAmount" th:text="${#numbers.formatDecimal(campaign.currentAmount ?: 0, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
              </div>
            </div>
            <div class="text-end">
              <small class="text-muted">Đạt được</small>
              <div class="fs-4 fw-bold text-dark" id="campaignProgressText" th:text="${campaign.progressPercentage} + '%'"></div>
            </div>
          </div>

          <div class="mb-4 text-secondary text-center p-2 rounded stat-box-bg">
            <i class="fa-solid fa-users me-2 text-primary-orange"></i>
            Đã có <strong class="text-dark fs-5" id="campaignDonationCount" th:text="${campaign.donationCount ?: 0}">0</strong> lượt ủng hộ
          </div>

          <button th:if="${!campaign.isClosed()}"
                  th:onclick="|window.location.href='@{/donate(campaignId=${campaign.id})}'|"
                  class="btn w-100 fw-bold mb-0 py-3 text-white btn-donate-action">
            Ủng hộ ngay
          </button>
          <button th:if="${campaign.isClosed()}"
                  class="btn btn-secondary w-100 fw-bold mb-0 py-3 btn-donate-disabled" disabled>
            <i class="fa-solid fa-lock me-2"></i> Chiến dịch đã đóng
          </button>
        </div>
      </div>
    </aside>
  </div>
</main>

<div th:replace="~{layout/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/campaign-detail.js}"></script>
</body>
</html>
