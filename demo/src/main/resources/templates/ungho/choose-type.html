<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tạo chiến dịch</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/choose-type.css}">
</head>
<body class="bg-light">
<div th:replace="~{layout/header :: header}"></div>
<main class="container choice-container py-5">
    <div class="text-center mb-5">
        <h2 class="fw-bold display-6">Chào bạn, bạn muốn bắt đầu từ đâu?</h2>
        <p class="text-muted fs-5">Hãy chọn tư cách phù hợp để chúng tôi hỗ trợ bạn tốt nhất.</p>
    </div>

    <div class="row justify-content-center g-4">
        <div class="col-md-5 col-lg-4">
            <div class="card choice-card shadow-sm rounded-4 p-4 text-center" onclick="window.location.href='/tao-chien-dich/ca-nhan'">
                <div class="icon-box"><i class="fa-solid fa-user"></i></div>
                <h3 class="choice-title fw-bold">Cá nhân</h3>
                <p class="choice-desc">Phù hợp để giúp đỡ bạn bè, người thân hoặc các trường hợp khẩn cấp quanh bạn.</p>
                <div class="mt-4">
                    <a th:href="@{/tao-chien-dich/ca-nhan}" class="btn btn-choice btn-person w-100">Chọn Cá nhân</a>
                </div>
            </div>
        </div>

        <div class="col-md-5 col-lg-4">
            <div class="card choice-card shadow-sm rounded-4 p-4 text-center" onclick="window.location.href='/tao-chien-dich/to-chuc'">
                <div class="icon-box"><i class="fa-solid fa-hotel"></i></div>
                <h3 class="choice-title fw-bold">Tổ chức</h3>
                <p class="choice-desc">Dành cho các quỹ thiện nguyện, CLB hoặc doanh nghiệp có pháp nhân minh bạch.</p>
                <div class="mt-4">
                    <a th:href="@{/tao-chien-dich/to-chuc}" class="btn btn-choice btn-org w-100">Chọn Tổ chức</a>
                </div>
            </div>
        </div>
    </div>
</main>
<div th:replace="~{layout/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
