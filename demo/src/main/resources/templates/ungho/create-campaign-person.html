<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tạo chiến dịch cá nhân</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/create-campaign-person.css}">
</head>
<body>
<div th:replace="~{layout/header :: header}"></div>

<div class="container">
    <div class="form-card">
        <form th:action="@{/tao-chien-dich/ca-nhan/luu}" th:object="${campaign}" method="POST" enctype="multipart/form-data">

            <div class="orange-header">PHẦN 1: THÔNG TIN CÁ NHÂN</div>
            <div class="form-body">
                <div class="row">
                    <div class="col-md-6">
                        <label class="m-label">Họ và Tên <span class="text-danger">*</span></label>
                        <input type="text" class="m-input" th:value="${user.fullName}" readonly>
                    </div>
                    <div class="col-md-6">
                        <label class="m-label">Ngày/tháng/năm sinh <span class="text-danger">*</span></label>
                        <input type="text" class="m-input" th:value="${user.dob != null ? #temporals.format(user.dob, 'dd/MM/yyyy') : 'Chưa cập nhật'}" readonly>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <label class="m-label">Số điện thoại <span class="text-danger">*</span></label>
                        <input type="text" class="m-input" th:value="${user.phone}" readonly>
                    </div>
                    <div class="col-md-6">
                        <label class="m-label">Địa chỉ thường trú <span class="text-danger">*</span></label>
                        <input type="text" class="m-input" th:value="${user.address}" readonly>
                    </div>
                </div>
            </div>

            <div class="orange-header">PHẦN 2: NỘI DUNG CHIẾN DỊCH</div>
            <div class="form-body">
                <label class="m-label">Ảnh chính chiến dịch <span class="text-danger">*</span></label>
                <input type="file" id="fileInput" name="imageFile" hidden accept="image/*">

                <div class="image-upload-zone mb-4" onclick="document.getElementById('fileInput').click()">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <p class="mb-0">Nhấp để tải lên ảnh đại diện chiến dịch</p>
                </div>

                <label class="m-label">Tên mục tiêu (Tiêu đề) <span class="text-danger">*</span></label>
                <input type="text" th:field="*{title}" class="m-input" placeholder="Vd: Quyên góp xây trường..." required>

                <div class="row">
                    <div class="col-md-6">
                        <label class="m-label">Số tiền mục tiêu (VND) <span class="text-danger">*</span></label>
                        <input type="number" th:field="*{targetAmount}" class="m-input hide-arrows" placeholder="Tối thiểu 10,000đ" min="10000" required>
                    </div>
                    <div class="col-md-6">
                        <label class="m-label">Danh mục <span class="text-danger">*</span></label>
                        <select class="m-input select2-category" th:field="*{category.id}" id="categorySelect" required>
                            <option value=""></option>
                            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                        </select>

                        <div id="otherCategoryDiv" style="display: none; margin-top: 5px;">
                            <input type="text" class="m-input" placeholder="Vui lòng ghi rõ lĩnh vực khác..." name="customCategoryName" style="border-bottom-color: #ff6a00; padding-top: 5px; margin-bottom: 10px;">
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <label class="m-label">Ngày kết thúc <span class="text-danger">*</span></label>
                        <input type="datetime-local" th:field="*{endDate}" class="m-input" required>
                    </div>
                    <div class="col-md-6">
                        <label class="m-label">Tỉnh / Thành phố <span class="text-danger">*</span></label>
                        <input type="text" th:field="*{locationName}" class="m-input" placeholder="Vd: Hà Giang" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="m-label"><i class="fa-solid fa-link text-primary me-1"></i> Link mạng xã hội (Facebook/Tiktok/Website...)</label>
                    <input type="text" name="socialLink" class="m-input" placeholder="Nhập đường dẫn trang cá nhân..." th:value="${user.socialLink}">
                </div>

                <label class="m-label">Câu chuyện chiến dịch (Nội dung chi tiết) <span class="text-danger">*</span></label>
                <textarea th:field="*{storyContent}" class="form-control mb-4" rows="5" placeholder="Chia sẻ câu chuyện của bạn..." required></textarea>
            </div>

            <div class="orange-header">PHẦN 3: THÔNG TIN TÀI KHOẢN NHẬN QUYÊN GÓP</div>
            <div class="form-body">
                <div class="alert alert-warning border-0 bg-opacity-10" style="background-color: #ff950015; color: #cc7000; border-radius: 8px;">
                    <i class="fa-solid fa-qrcode me-2"></i> <strong>Lưu ý:</strong> Thông tin này sẽ được dùng để tạo mã QR tự động. Vui lòng nhập chính xác để người ủng hộ chuyển khoản không bị lỗi.
                </div>

                <div class="row mt-4">
                    <div class="col-md-4">
                        <label class="m-label">Ngân hàng <span class="text-danger">*</span></label>
                        <select class="m-input select2-bank" th:field="*{bankName}" required>
                            <option value=""></option>
                            <option value="MB">MBBank (Ngân hàng Quân Đội)</option>
                            <option value="VCB">Vietcombank</option>
                            <option value="TCB">Techcombank (Ngân hàng Kỹ Thương)</option>
                            <option value="VPB">VPBank (Ngân hàng Việt Nam Thịnh Vượng)</option>
                            <option value="ACB">ACB (Ngân hàng Á Châu)</option>
                            <option value="BIDV">BIDV (Ngân hàng Đầu tư và Phát triển)</option>
                            <option value="CTG">VietinBank</option>
                            <option value="TPB">TPBank (Ngân hàng Tiên Phong)</option>
                            <option value="STB">Sacombank</option>
                            <option value="AGRIBANK">Agribank (Ngân hàng Nông nghiệp)</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="m-label">Số tài khoản <span class="text-danger">*</span></label>
                        <input type="text" th:field="*{bankAccountNumber}" class="m-input" placeholder="Vd: 0987654321" required>
                    </div>
                    <div class="col-md-4">
                        <label class="m-label">Tên chủ tài khoản <span class="text-danger">*</span></label>
                        <input type="text" th:field="*{bankAccountName}" class="m-input" style="text-transform: uppercase;" placeholder="VD: NGUYEN VAN A" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-submit mt-4">XÁC NHẬN TẠO CHIẾN DỊCH</button>
            </div>
        </form>
    </div>
</div>

<div th:replace="~{layout/footer :: footer}"></div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/create-campaign-person.js}"></script>

</body>
</html>
