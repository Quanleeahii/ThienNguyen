<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/auth/login.css}">
</head>
<body class="login-page">

<div class="login-container">
    <div class="form-box">
        <a th:href="@{/}" class="back-home-btn">
            <i class="fa-solid fa-house-chimney me-1"></i> Trang chủ
        </a>

        <h2 class="mb-4 fw-bold">Đăng nhập</h2>

        <p th:if="${error}" class="error-text-custom text-center">
            <i class="fa-solid fa-circle-exclamation me-1"></i> <span th:text="${error}"></span>
        </p>

        <p th:if="${param.success}" class="text-success text-center mb-3" style="font-weight: 500;">
            Đăng ký thành công! Vui lòng đăng nhập.
        </p>

        <form th:action="@{/dang-nhap}" method="POST" id="loginForm" novalidate>
            <div class="mb-3">
                <label for="email" class="form-label text-muted fs-6">Email</label>
                <input type="email" name="username" id="email" class="form-control px-3 py-2" placeholder="Nhập địa chỉ email">
                <small class="error-msg text-danger" id="emailError"></small>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label text-muted fs-6">Mật khẩu</label>
                <div class="position-relative">
                    <input type="password" name="password" id="password" class="form-control px-3 py-2" placeholder="Nhập mật khẩu">
                    <span onclick="togglePassword('password')" class="eye position-absolute top-50 end-0 translate-middle-y eye-icon-custom">
                        <i class="fa-solid fa-eye" id="icon-password"></i>
                    </span>
                </div>
                <small class="error-msg text-danger" id="passError"></small>
            </div>

            <div class="text-end mb-4">
                <a href="quen-mat-khau" class="forgot-password text-decoration-none">Quên mật khẩu</a>
            </div>

            <button type="submit" class="login-btn w-100 py-2 fw-bold btn-orange-gradient">Đăng nhập</button>
        </form>

        <p class="register-text text-center mt-4">
            Bạn chưa có tài khoản? <a th:href="@{/dang-ky}" class="text-decoration-none fw-bold">Đăng ký ngay</a>
        </p>

        <p class="terms-text text-center mt-3 text-muted" style="font-size: 13px;">
            Bằng việc tiếp tục, bạn đã đồng ý với <a href="#" class="text-decoration-none fw-bold" style="color: #ff6a00;">Điều khoản sử dụng</a>
        </p>
    </div>
</div>

<script th:src="@{/js/auth/login.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
