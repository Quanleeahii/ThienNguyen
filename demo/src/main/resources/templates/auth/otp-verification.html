<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xác thực OTP</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/auth/otp-verification.css}">
</head>
<body class="login-page">
<div class="login-container">
  <div class="form-box">
    <a th:href="@{/dat-lai-mat-khau}" class="back-home-btn">
      <i class="fa-solid fa-arrow-left me-1"></i> Quay lại
    </a>
    <h2 class="mb-3 fw-bold mt-3">Xác thực OTP</h2>
    <p class="text-muted mb-4 subtitle-text">
      Vui lòng nhập mã xác thực gồm 6 chữ số đã được gửi đến email:<br>
      <span class="fw-bold" style="color: #ff6a00;" th:text="${email}"></span>
    </p>
    <p th:if="${error}" class="error-text-custom text-center">
      <i class="fa-solid fa-circle-exclamation me-1"></i> <span th:text="${error}"></span>
    </p>
    <form th:action="@{/xac-thuc-otp}" method="POST" id="otpForm" novalidate>
      <div class="d-flex justify-content-between mb-4 otp-container">
        <input type="text" name="otp1" class="form-control otp-box" maxlength="1" autocomplete="off" inputmode="numeric">
        <input type="text" name="otp2" class="form-control otp-box" maxlength="1" autocomplete="off" inputmode="numeric">
        <input type="text" name="otp3" class="form-control otp-box" maxlength="1" autocomplete="off" inputmode="numeric">
        <input type="text" name="otp4" class="form-control otp-box" maxlength="1" autocomplete="off" inputmode="numeric">
        <input type="text" name="otp5" class="form-control otp-box" maxlength="1" autocomplete="off" inputmode="numeric">
        <input type="text" name="otp6" class="form-control otp-box" maxlength="1" autocomplete="off" inputmode="numeric">
      </div>
      <button type="submit" class="login-btn w-100 py-2 fw-bold btn-orange-gradient">Xác nhận</button>
    </form>
  </div>
</div>
<script th:src="@{/js/auth/otp-verification.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
