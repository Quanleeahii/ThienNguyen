<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/auth/register.css}">
</head>
<body class="login-page">
<div class="login-container">
    <div class="form-box">
        <a th:href="@{/}" class="back-home-btn">
            <i class="fa-solid fa-house-chimney me-1"></i> Trang chủ
        </a>
        <h2 class="mb-4 text-center fw-bold">Đăng ký tài khoản</h2>
        <p th:if="${error}" class="error-text-custom">
            <i class="fa-solid fa-circle-exclamation me-1"></i> <span th:text="${error}"></span>
        </p>
        <form th:action="@{/dang-ky}" method="POST" id="registerForm" novalidate>
            <div class="mb-3">
                <input type="email" name="email" id="email" class="form-control px-3 py-2" placeholder="Nhập địa chỉ email">
                <small class="error-msg text-danger" id="emailError"></small>
            </div>
            <div class="mb-3">
                <input type="text" name="fullName" id="name" class="form-control px-3 py-2" placeholder="Họ tên hoặc biệt danh">
                <small class="error-msg text-danger" id="nameError"></small>
            </div>
            <div class="mb-3">
                <div class="position-relative">
                    <input type="password" name="password" id="password1" class="form-control px-3 py-2" placeholder="Nhập mật khẩu (tối thiểu 6 ký tự)">
                    <span onclick="togglePassword('password1')" class="eye position-absolute top-50 end-0 translate-middle-y eye-icon-custom">
                        <i class="fa-solid fa-eye" id="icon-password1"></i>
                    </span>
                </div>
                <small class="error-msg text-danger" id="passError"></small>
            </div>
            <div class="mb-4">
                <div class="position-relative">
                    <input type="password" name="confirmPassword" id="password2" class="form-control px-3 py-2" placeholder="Nhập lại mật khẩu">
                    <span onclick="togglePassword('password2')" class="eye position-absolute top-50 end-0 translate-middle-y eye-icon-custom">
                        <i class="fa-solid fa-eye" id="icon-password2"></i>
                    </span>
                </div>
                <small class="error-msg text-danger" id="pass2Error"></small>
            </div>
            <button type="submit" class="login-btn w-100 py-2 fw-bold btn-orange-gradient">Tiếp tục</button>
        </form>
        <p class="register-text text-center mt-4">
            Bạn đã có tài khoản? <a th:href="@{/dang-nhap}" class="text-decoration-none fw-bold">Đăng nhập</a>
        </p>
    </div>
</div>
<script th:src="@{/js/auth/register.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
