<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/auth/forgot-password.css}">
</head>
<body class="login-page">
<div class="login-container">
    <div class="form-box">
        <a th:href="@{/dang-nhap}" class="back-home-btn">
            <i class="fa-solid fa-arrow-left me-1"></i> Quay lại
        </a>
        <h2 class="mb-3 fw-bold mt-3">Quên mật khẩu</h2>

        <p class="text-muted mb-4 subtitle-text">
            Hãy nhập địa chỉ email của bạn. Chúng tôi sẽ gửi cho bạn mã xác thực để truy cập lại vào tài khoản
        </p>

        <p th:if="${error}" class="error-text-custom text-center">
            <i class="fa-solid fa-circle-exclamation me-1"></i> <span th:text="${error}"></span>
        </p>
        <form th:action="@{/quen-mat-khau}" method="POST" id="forgotForm" novalidate>
            <div class="mb-4">
                <input type="email" name="email" id="email" class="form-control px-3 py-2" placeholder="Nhập địa chỉ email">
                <small class="error-msg text-danger" id="emailError"></small>
            </div>
            <button type="submit" class="login-btn w-100 py-2 fw-bold btn-orange-gradient">Tiếp tục</button>
        </form>
    </div>
</div>
<script th:src="@{/js/auth/forgot-password.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
