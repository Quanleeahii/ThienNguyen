<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đặt lại mật khẩu</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/auth/reset-password.css}">
</head>
<body class="login-page">

<div class="login-container">
  <div class="form-box">
    <h2 class="mb-3 fw-bold">Nhập mật khẩu</h2>

    <p class="text-muted mb-4 subtitle-text">
      Hãy chọn hiện mật khẩu để kiểm tra mật khẩu của bạn trước khi hoàn tất
    </p>

    <p th:if="${error}" class="error-text-custom text-center">
      <i class="fa-solid fa-circle-exclamation me-1"></i> <span th:text="${error}"></span>
    </p>

    <form th:action="@{/dat-lai-mat-khau}" method="POST" id="resetForm" novalidate>
      <input type="hidden" name="email" th:value="${email}">

      <div class="mb-4">
        <div class="position-relative">
          <input type="password" name="password" id="password" class="form-control px-3 py-2" placeholder="Nhập mật khẩu">
          <span onclick="togglePassword('password')" class="eye position-absolute top-50 end-0 translate-middle-y eye-icon-custom">
                        <i class="fa-solid fa-eye" id="icon-password"></i>
                    </span>
        </div>
        <small class="error-msg text-danger" id="passError"></small>
      </div>

      <div class="mb-4">
        <div class="position-relative">
          <input type="password" name="confirmPassword" id="confirmPassword" class="form-control px-3 py-2" placeholder="Nhập lại mật khẩu">
          <span onclick="togglePassword('confirmPassword')" class="eye position-absolute top-50 end-0 translate-middle-y eye-icon-custom">
                        <i class="fa-solid fa-eye" id="icon-confirmPassword"></i>
                    </span>
        </div>
        <small class="error-msg text-danger" id="confirmPassError"></small>
      </div>

      <button type="submit" class="login-btn w-100 py-2 fw-bold btn-orange-gradient">Cập nhật mật khẩu</button>
    </form>
  </div>
</div>

<script th:src="@{/js/auth/reset-password.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
